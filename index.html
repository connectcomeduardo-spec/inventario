<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventário de TI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- Sidebar / Nav -->
    <nav class="bg-blue-700 text-white p-4 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <span>💻</span> Inventário de TI
        </h1>
        <div class="flex gap-4">
            <label class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded cursor-pointer text-sm font-semibold transition">
                📥 Importar Excel
                <input type="file" id="uploadExcel" accept=".xlsx, .xls" class="hidden">
            </label>
            <button onclick="exportarDados()" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded text-sm font-semibold">
                📤 Exportar JSON
            </button>
            <button onclick="limparDados()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded text-sm font-semibold">
                🗑️ Limpar Tudo
            </button>
        </div>
    </nav>

    <main class="p-6">
        <!-- Dashboard Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-blue-500">
                <p class="text-gray-500 text-sm uppercase font-bold">Total de Ativos</p>
                <h2 id="statTotal" class="text-3xl font-bold">0</h2>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-green-500">
                <p class="text-gray-500 text-sm uppercase font-bold">Ativos Operacionais</p>
                <h2 id="statAtivos" class="text-3xl font-bold">0</h2>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-yellow-500">
                <p class="text-gray-500 text-sm uppercase font-bold">Em Manutenção</p>
                <h2 id="statManutencao" class="text-3xl font-bold">0</h2>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border-l-4 border-purple-500">
                <p class="text-gray-500 text-sm uppercase font-bold">Fabricantes</p>
                <h2 id="statMarcas" class="text-3xl font-bold">0</h2>
            </div>
        </div>

        <!-- Charts Area -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h3 class="font-bold mb-4 text-gray-600 text-center">Distribuição por Status</h3>
                <canvas id="chartStatus" height="100"></canvas>
            </div>
            <div class="bg-white p-4 rounded-xl shadow-sm border">
                <h3 class="font-bold mb-4 text-gray-600 text-center">Top Fabricantes</h3>
                <canvas id="chartMarcas" height="100"></canvas>
            </div>
        </div>

        <!-- Filtros -->
        <div class="bg-white p-4 rounded-xl shadow-sm border mb-6">
            <h3 class="font-bold mb-4 text-gray-700 flex items-center gap-2">🔍 Filtros Rápidos</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                <input type="text" id="filterBusca" placeholder="Busca geral..." class="p-2 border rounded text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                <select id="filterStatus" class="p-2 border rounded text-sm bg-white cursor-pointer"><option value="">Todos os Status</option></select>
                <select id="filterDepto" class="p-2 border rounded text-sm bg-white cursor-pointer"><option value="">Todos Deptos</option></select>
                <select id="filterTipo" class="p-2 border rounded text-sm bg-white cursor-pointer"><option value="">Todos os Tipos</option></select>
                <select id="filterAtende" class="p-2 border rounded text-sm bg-white cursor-pointer">
                    <option value="">Atende Requisitos?</option>
                    <option value="Sim">Sim</option>
                    <option value="Não">Não</option>
                </select>
                <button onclick="aplicarFiltros()" class="bg-gray-800 text-white rounded font-bold hover:bg-black transition">Filtrar</button>
            </div>
        </div>

        <!-- Tabela -->
        <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
            <div class="overflow-x-auto custom-scroll max-h-[600px]">
                <table class="w-full text-left text-sm border-collapse" id="tabelaInventario">
                    <thead class="bg-gray-100 sticky top-0 z-10">
                        <tr id="tableHeader">
                            <!-- Cabeçalhos serão gerados dinamicamente -->
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200" id="tableBody">
                        <!-- Linhas serão geradas aqui -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let inventario = JSON.parse(localStorage.getItem('it_inventory')) || [];
        let chartStatusInstance, chartMarcasInstance;

        // Mapeamento dos campos da imagem
        const campos = [
            "#", "Atende os Requisitos", "Fabricante", "Modelo", "Tipo", "Nome", "Computador", "IP", 
            "Localidade", "Departamento", "Status", "Último Usuário", "Usuário/RE", "Cargo", "E-mail", 
            "Patrimônio", "Número de Série", "Processador", "Memória RAM", "HD - Tamanho", "Velocidade", 
            "Sistema Operacional", "Release (SO)", "Arquitetura", "Pacote Office", "Office Key", 
            "Softwares", "Versão Antivirus", "Nessus Test", "Versão Edge", "Versão Chrome", 
            "Versão Firefox", "Versão Opera", "TOTVS Launcher", "GO-Global", "Active Account", 
            "Versão Java", "Versão Adobe", "Possui Monitor", "Versão Matrix", "Resolução", 
            "Impeditivo", "Data Aquisição", "Nota Fiscal", "Histórico", "Observações", 
            "Último Inventário", "Versão Software", "Chave Criptografia"
        ];

        document.addEventListener('DOMContentLoaded', () => {
            renderHeader();
            renderAll();
            setupUpload();
        });

        function renderHeader() {
            const headerRow = document.getElementById('tableHeader');
            headerRow.innerHTML = campos.map(c => `<th class="px-4 py-3 font-semibold text-gray-600 border-b min-w-[150px]">${c}</th>`).join('');
        }

        function setupUpload() {
            document.getElementById('uploadExcel').addEventListener('change', function(e) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet);
                    
                    processarImportacao(jsonData);
                };
                reader.readAsArrayBuffer(e.target.files[0]);
            });
        }

        function processarImportacao(novosDados) {
            novosDados.forEach(novoItem => {
                // Chave única: Patrimônio ou Número de Série
                const index = inventario.findIndex(item => item["Patrimônio"] == novoItem["Patrimônio"] && item["Patrimônio"] !== undefined);
                
                if (index !== -1) {
                    // Atualiza dados existentes
                    inventario[index] = { ...inventario[index], ...novoItem };
                } else {
                    // Adiciona novo
                    inventario.push(novoItem);
                }
            });

            salvarERenderizar();
            alert("Dados importados e atualizados com sucesso!");
        }

        function renderAll(dadosFiltrados = null) {
            const lista = dadosFiltrados || inventario;
            const body = document.getElementById('tableBody');
            body.innerHTML = '';

            lista.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50 transition border-b";
                tr.innerHTML = campos.map(campo => {
                    let valor = item[campo] || '-';
                    let corStatus = "";
                    if (campo === "Status") {
                        if (valor.toLowerCase() === "ativo") corStatus = "text-green-600 font-bold";
                        if (valor.toLowerCase().includes("manutenção")) corStatus = "text-yellow-600 font-bold";
                    }
                    return `<td class="px-4 py-2 ${corStatus}">${valor}</td>`;
                }).join('');
                body.appendChild(tr);
            });

            atualizarStats(lista);
            popularFiltros();
            initCharts(lista);
        }

        function atualizarStats(lista) {
            document.getElementById('statTotal').innerText = lista.length;
            document.getElementById('statAtivos').innerText = lista.filter(i => String(i.Status).toLowerCase() === 'ativo').length;
            document.getElementById('statManutencao').innerText = lista.filter(i => String(i.Status).toLowerCase().includes('manutenção')).length;
            
            const marcas = [...new Set(lista.map(i => i.Fabricante))].filter(Boolean);
            document.getElementById('statMarcas').innerText = marcas.length;
        }

        function popularFiltros() {
            const createOptions = (campo, id) => {
                const select = document.getElementById(id);
                const valorAtual = select.value;
                const opcoes = [...new Set(inventario.map(i => i[campo]))].filter(Boolean).sort();
                select.innerHTML = `<option value="">Todos ${campo}</option>` + 
                    opcoes.map(o => `<option value="${o}" ${o == valorAtual ? 'selected' : ''}>${o}</option>`).join('');
            };

            createOptions("Status", "filterStatus");
            createOptions("Departamento", "filterDepto");
            createOptions("Tipo", "filterTipo");
        }

        function aplicarFiltros() {
            const busca = document.getElementById('filterBusca').value.toLowerCase();
            const status = document.getElementById('filterStatus').value;
            const depto = document.getElementById('filterDepto').value;
            const tipo = document.getElementById('filterTipo').value;
            const atende = document.getElementById('filterAtende').value;

            const filtrados = inventario.filter(item => {
                const matchBusca = Object.values(item).some(v => String(v).toLowerCase().includes(busca));
                const matchStatus = !status || item.Status === status;
                const matchDepto = !depto || item.Departamento === depto;
                const matchTipo = !tipo || item.Tipo === tipo;
                const matchAtende = !atende || item["Atende os Requisitos"] === atende;

                return matchBusca && matchStatus && matchDepto && matchTipo && matchAtende;
            });

            renderAll(filtrados);
        }

        function initCharts(lista) {
            if (chartStatusInstance) chartStatusInstance.destroy();
            if (chartMarcasInstance) chartMarcasInstance.destroy();

            const statusCounts = {};
            const marcaCounts = {};

            lista.forEach(i => {
                statusCounts[i.Status] = (statusCounts[i.Status] || 0) + 1;
                marcaCounts[i.Fabricante] = (marcaCounts[i.Fabricante] || 0) + 1;
            });

            const ctxStatus = document.getElementById('chartStatus').getContext('2d');
            chartStatusInstance = new Chart(ctxStatus, {
                type: 'pie',
                data: {
                    labels: Object.keys(statusCounts),
                    datasets: [{
                        data: Object.values(statusCounts),
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
                    }]
                },
                options: { responsive: true, plugins: { legend: { position: 'right' } } }
            });

            const ctxMarcas = document.getElementById('chartMarcas').getContext('2d');
            chartMarcasInstance = new Chart(ctxMarcas, {
                type: 'bar',
                data: {
                    labels: Object.keys(marcaCounts),
                    datasets: [{
                        label: 'Qtd por Fabricante',
                        data: Object.values(marcaCounts),
                        backgroundColor: '#6366f1'
                    }]
                },
                options: { responsive: true }
            });
        }

        function salvarERenderizar() {
            localStorage.setItem('it_inventory', JSON.stringify(inventario));
            renderAll();
        }

        function limparDados() {
            if (confirm("Tem certeza que deseja apagar todo o inventário?")) {
                inventario = [];
                salvarERenderizar();
            }
        }

        function exportarDados() {
            const blob = new Blob([JSON.stringify(inventario, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'backup_inventario_ti.json';
            a.click();
        }
    </script>
</body>
</html>
